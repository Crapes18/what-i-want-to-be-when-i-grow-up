<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowUp — What Do You Want to Be?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --text: #1A1A1A;
    --bg: #FFFFFF;
    --border: #E8E8E4;
    --muted: #6B6B6B;
    --accent: #4F46E5;
    --accent-light: #EEF2FF;
    --success: #10B981;
    --warning: #F59E0B;
    --danger: #EF4444;
    --radius: 12px;
    --radius-lg: 20px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .nav-logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .nav-logo-text { font-weight: 700; font-size: 18px; }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-links a {
    text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500;
    padding: 6px 14px; border-radius: 8px; transition: all 0.2s;
  }
  .nav-links a:hover { color: var(--text); background: var(--border); }
  .btn-nav {
    background: var(--accent); color: white !important;
    padding: 8px 18px !important; border-radius: 8px !important;
    font-weight: 600 !important; font-size: 14px !important;
    transition: opacity 0.2s !important;
  }
  .btn-nav:hover { opacity: 0.9; background: var(--accent) !important; }

  /* SECTIONS */
  section { padding: 80px 24px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-label {
    display: inline-block; font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px;
  }
  h1, h2, h3 { font-weight: 700; line-height: 1.2; }
  h1 { font-size: clamp(36px, 5vw, 60px); }
  h2 { font-size: clamp(28px, 4vw, 44px); }
  h3 { font-size: 20px; }
  p { color: var(--muted); font-size: 16px; line-height: 1.7; }

  /* HERO */
  #hero {
    padding-top: 100px; padding-bottom: 80px;
    text-align: center;
    background: linear-gradient(180deg, #F8F8FF 0%, #FFFFFF 100%);
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid #C7D2FE; border-radius: 100px;
    padding: 6px 14px; font-size: 13px; font-weight: 600;
    margin-bottom: 28px;
  }
  .hero-badge span { font-size: 15px; }
  #hero h1 { margin-bottom: 20px; max-width: 780px; margin-left: auto; margin-right: auto; }
  #hero h1 em { font-style: normal; color: var(--accent); }
  #hero p { max-width: 540px; margin: 0 auto 40px; font-size: 18px; }
  .hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 64px; }
  .btn-primary {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius); padding: 14px 28px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary {
    background: white; color: var(--text);
    border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 28px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .btn-secondary:hover { border-color: #C7C7C3; transform: translateY(-1px); }
  .hero-stats {
    display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
    padding-top: 40px; border-top: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--text); }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* APP PREVIEW CARD */
  .app-preview {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    max-width: 900px;
    margin: 0 auto 60px;
  }
  .app-preview-bar {
    background: #F5F5F5;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #FF5F57; }
  .dot-y { background: #FEBC2E; }
  .dot-g { background: #28C840; }
  .app-preview-url {
    flex: 1; background: white; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 12px;
    font-size: 13px; color: var(--muted); text-align: center;
    margin: 0 8px;
  }

  /* QUIZ SECTION */
  #quiz { background: #FAFAFA; }
  .quiz-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    max-width: 680px; margin: 0 auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  }
  .quiz-progress {
    display: flex; gap: 6px; margin-bottom: 32px;
  }
  .quiz-progress-bar {
    flex: 1; height: 4px; border-radius: 100px;
    background: var(--border); transition: background 0.3s;
  }
  .quiz-progress-bar.active { background: var(--accent); }
  .quiz-question { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .quiz-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quiz-option {
    border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 12px;
    background: white;
  }
  .quiz-option:hover { border-color: var(--accent); background: var(--accent-light); }
  .quiz-option.selected { border-color: var(--accent); background: var(--accent-light); }
  .quiz-option-icon { font-size: 28px; flex-shrink: 0; }
  .quiz-option-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .quiz-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 28px;
  }
  .quiz-step-label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .btn-quiz-next {
    background: var(--accent); color: white;
    border: none; border-radius: 8px; padding: 12px 24px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s; opacity: 0.4; pointer-events: none;
  }
  .btn-quiz-next.enabled { opacity: 1; pointer-events: all; }
  .btn-quiz-next.enabled:hover { opacity: 0.88; }

  /* RESULT CARD */
  .quiz-result { display: none; text-align: center; }
  .quiz-result.show { display: block; }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .result-desc { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
  .result-matches {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px;
  }
  .result-match-pill {
    background: var(--accent-light); color: var(--accent);
    border: 1px solid #C7D2FE; border-radius: 100px;
    padding: 6px 16px; font-size: 13px; font-weight: 600;
  }
  .quiz-form { display: none; }
  .quiz-form.show { display: block; }
  .quiz-form h3 { font-size: 18px; margin-bottom: 8px; }
  .quiz-form p { font-size: 14px; margin-bottom: 20px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-input {
    flex: 1; min-width: 180px; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    font-family: inherit; font-size: 15px; color: var(--text);
    outline: none; transition: border 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .btn-form-submit {
    background: var(--accent); color: white;
    border: none; border-radius: 8px; padding: 12px 24px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .btn-form-submit:hover { opacity: 0.88; }

  /* CAREERS GRID */
  #careers { background: var(--bg); }
  .careers-header { text-align: center; margin-bottom: 48px; }
  .careers-header h2 { margin-bottom: 12px; }
  .careers-filters {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px;
  }
  .filter-btn {
    border: 1.5px solid var(--border); background: white; color: var(--muted);
    border-radius: 100px; padding: 8px 18px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .careers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .career-card {
    border: 1.5px solid var(--border); border-radius: var(--radius-lg);
    padding: 24px; cursor: pointer; transition: all 0.25s;
    background: white; position: relative; overflow: hidden;
  }
  .career-card:hover {
    border-color: var(--accent); transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(79,70,229,0.12);
  }
  .career-card-emoji { font-size: 42px; margin-bottom: 14px; display: block; }
  .career-card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .career-card-tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    border-radius: 100px; padding: 3px 10px; margin-bottom: 12px;
  }
  .career-card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .career-card-locked {
    position: absolute; top: 14px; right: 14px;
    background: var(--border); border-radius: 100px;
    padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .tag-science { background: #D1FAE5; color: #059669; }
  .tag-creative { background: #FEF3C7; color: #D97706; }
  .tag-helper { background: #DBEAFE; color: #2563EB; }
  .tag-builder { background: #FCE7F3; color: #DB2777; }
  .tag-nature { background: #D1FAE5; color: #059669; }
  .tag-tech { background: #E0E7FF; color: #4338CA; }
  .tag-sport { background: #FEE2E2; color: #DC2626; }
  .tag-food { background: #FEF9C3; color: #854D0E; }

  /* CAREER MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white; border-radius: var(--radius-lg);
    max-width: 560px; width: 100%; max-height: 85vh;
    overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.2);
    transform: translateY(20px); transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 32px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-emoji { font-size: 56px; margin-bottom: 12px; display: block; }
  .modal-close {
    background: var(--border); border: none; border-radius: 50%;
    width: 32px; height: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; margin-top: 4px;
  }
  .modal-body { padding: 24px 32px 32px; }
  .modal-section { margin-bottom: 24px; }
  .modal-section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .modal-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-fact {
    background: #FAFAFA; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
  }
  .modal-fact-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .modal-fact-value { font-size: 14px; font-weight: 600; }
  .skill-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .skill-chip {
    background: var(--accent-light); color: var(--accent);
    border-radius: 100px; padding: 5px 12px; font-size: 12px; font-weight: 600;
  }
  .day-in-life { font-size: 14px; color: var(--muted); line-height: 1.7; }
  .modal-cta {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius); padding: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; width: 100%; margin-top: 8px;
  }
  .modal-cta:hover { opacity: 0.88; }
  .modal-locked-notice {
    background: #FFFBEB; border: 1.5px solid #FDE68A;
    border-radius: var(--radius); padding: 16px;
    display: flex; align-items: center; gap: 12px; margin-top: 16px;
  }
  .modal-locked-notice span { font-size: 20px; }
  .modal-locked-notice p { font-size: 14px; color: #92400E; margin: 0; }

  /* DASHBOARD */
  #dashboard { background: #FAFAFA; }
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 48px; }
  .dashboard-card {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px;
  }
  .dashboard-card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .dashboard-card-title { font-size: 16px; font-weight: 700; }
  .dashboard-card-badge {
    background: var(--accent-light); color: var(--accent);
    border-radius: 100px; padding: 4px 10px; font-size: 12px; font-weight: 600;
  }
  .child-selector {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .child-btn {
    border: 1.5px solid var(--border); background: white;
    border-radius: 100px; padding: 6px 16px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .child-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .activity-list { display: flex; flex-direction: column; gap: 12px; }
  .activity-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { font-size: 22px; width: 36px; text-align: center; }
  .activity-info { flex: 1; }
  .activity-name { font-size: 14px; font-weight: 600; }
  .activity-time { font-size: 12px; color: var(--muted); }
  .activity-score {
    font-size: 12px; font-weight: 600;
    background: #D1FAE5; color: #065F46;
    border-radius: 100px; padding: 3px 10px;
  }
  .chart-bars { display: flex; align-items: flex-end; gap: 10px; height: 100px; margin-top: 12px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chart-bar {
    width: 100%; border-radius: 6px 6px 0 0;
    background: var(--accent); opacity: 0.8;
    transition: height 0.5s ease;
  }
  .chart-label { font-size: 11px; color: var(--muted); font-weight: 500; }
  .insight-box {
    background: var(--accent-light); border: 1px solid #C7D2FE;
    border-radius: var(--radius); padding: 16px;
  }
  .insight-box p { color: var(--accent); font-size: 14px; font-weight: 500; }

  /* PRICING */
  #pricing { background: var(--bg); }
  .pricing-header { text-align: center; margin-bottom: 48px; }
  .pricing-header h2 { margin-bottom: 12px; }
  .pricing-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 740px; margin: 0 auto; }
  .pricing-card {
    border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 36px;
    position: relative;
  }
  .pricing-card.featured {
    border-color: var(--accent);
    background: linear-gradient(135deg, #F8F8FF 0%, white 100%);
  }
  .pricing-badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white;
    border-radius: 100px; padding: 5px 16px; font-size: 12px; font-weight: 700;
    white-space: nowrap;
  }
  .pricing-plan { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .pricing-price { font-size: 48px; font-weight: 800; margin-bottom: 6px; }
  .pricing-price sup { font-size: 24px; vertical-align: top; margin-top: 10px; font-weight: 600; }
  .pricing-price sub { font-size: 16px; font-weight: 400; color: var(--muted); }
  .pricing-trial { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .pricing-features li { font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .pricing-features li::before { content: '✓'; color: var(--success); font-weight: 700; flex-shrink: 0; }
  .pricing-features li.muted { color: var(--muted); }
  .pricing-features li.muted::before { content: '—'; color: var(--border); }
  .btn-pricing {
    width: 100%; border: none; border-radius: var(--radius); padding: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .btn-pricing-outline {
    background: white; color: var(--text); border: 1.5px solid var(--border);
  }
  .btn-pricing-outline:hover { border-color: var(--text); }
  .btn-pricing-fill { background: var(--accent); color: white; }
  .btn-pricing-fill:hover { opacity: 0.88; }
  .pricing-guarantee {
    text-align: center; margin-top: 28px;
    font-size: 13px; color: var(--muted);
  }

  /* HOW IT WORKS */
  #how { background: #FAFAFA; }
  .how-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 48px; }
  .how-step { text-align: center; }
  .how-step-num {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: white;
    font-size: 20px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .how-step h3 { margin-bottom: 10px; }
  .how-step p { font-size: 14px; }

  /* TESTIMONIALS */
  #testimonials { background: var(--bg); }
  .testimonials-header { text-align: center; margin-bottom: 48px; }
  .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .testimonial-card {
    border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 28px;
  }
  .testimonial-stars { color: #F59E0B; font-size: 16px; margin-bottom: 14px; }
  .testimonial-text { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 20px; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: 12px; }
  .testimonial-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; background: var(--border);
  }
  .testimonial-name { font-size: 14px; font-weight: 600; }
  .testimonial-role { font-size: 12px; color: var(--muted); }

  /* CTA FOOTER */
  #cta-footer {
    background: var(--text); color: white;
    text-align: center; padding: 80px 24px;
  }

</body>
</html>
