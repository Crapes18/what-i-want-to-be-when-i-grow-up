<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Job Explorer 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Geist", sans-serif; background: #FFF9F0; min-height: 100vh; }
</style>
</head>
<body>

<!-- HEADER -->
<div style="background:linear-gradient(135deg,#FF6B6B,#FF8E53);padding:24px;text-align:center">
  <div style="font-size:48px;margin-bottom:8px">🌟</div>
  <h1 style="color:#fff;font-size:28px;font-weight:900;letter-spacing:-0.5px">What Do You Want to Be?</h1>
  <p style="color:rgba(255,255,255,0.9);font-size:15px;margin-top:6px">Answer some fun questions and discover your dream job!</p>
</div>

<!-- QUIZ SECTION -->
<div id="quiz" style="max-width:540px;margin:32px auto;padding:0 20px">

  <!-- Question 1 -->
  <div class="q" id="q1" style="background:#fff;border-radius:24px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:16px">
    <div style="font-size:32px;margin-bottom:12px">🤔</div>
    <h2 style="font-size:20px;font-weight:800;color:#1A1A1A;margin-bottom:20px">What do you love doing most?</h2>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="pick(1,'art')" class="ans" style="background:#FFE8F0;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🎨 Drawing and making things</button>
      <button onclick="pick(1,'science')" class="ans" style="background:#E8F4FF;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🔬 Doing experiments and asking why</button>
      <button onclick="pick(1,'help')" class="ans" style="background:#E8FFE8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🤝 Helping people and animals</button>
      <button onclick="pick(1,'build')" class="ans" style="background:#FFF3E8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🏗️ Building and fixing things</button>
    </div>
  </div>

  <!-- Question 2 (hidden) -->
  <div class="q" id="q2" style="background:#fff;border-radius:24px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:16px;display:none">
    <div style="font-size:32px;margin-bottom:12px">🌈</div>
    <h2 style="font-size:20px;font-weight:800;color:#1A1A1A;margin-bottom:20px">Where would you love to work?</h2>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="pick(2,'outside')" class="ans" style="background:#E8FFE8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🌳 Outside in nature</button>
      <button onclick="pick(2,'studio')" class="ans" style="background:#FFE8F0;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🎭 In a studio or on a stage</button>
      <button onclick="pick(2,'hospital')" class="ans" style="background:#E8F4FF;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🏥 Helping people feel better</button>
      <button onclick="pick(2,'lab')" class="ans" style="background:#FFF3E8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🔭 In a lab or workshop</button>
    </div>
  </div>

  <!-- Question 3 (hidden) -->
  <div class="q" id="q3" style="background:#fff;border-radius:24px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:16px;display:none">
    <div style="font-size:32px;margin-bottom:12px">⚡</div>
    <h2 style="font-size:20px;font-weight:800;color:#1A1A1A;margin-bottom:20px">What superpower would you pick?</h2>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="showResult('artist')" class="ans" style="background:#FFE8F0;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">✨ Making beautiful things</button>
      <button onclick="showResult('doctor')" class="ans" style="background:#E8F4FF;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">💊 Healing people</button>
      <button onclick="showResult('engineer')" class="ans" style="background:#FFF3E8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">⚙️ Inventing cool stuff</button>
      <button onclick="showResult('scientist')" class="ans" style="background:#E8FFE8;border:2px solid transparent;border-radius:14px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;cursor:pointer;color:#1A1A1A">🔬 Discovering new things</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="height:8px;background:#E8E8E4;border-radius:99px;overflow:hidden;margin-bottom:32px">
    <div id="progress" style="height:100%;width:33%;background:linear-gradient(90deg,#FF6B6B,#FF8E53);border-radius:99px;transition:width 0.4s"></div>
  </div>
</div>

<!-- RESULT (hidden) -->
<div id="result" style="display:none;max-width:540px;margin:0 auto;padding:0 20px 48px">

  <div id="result-card" style="background:#fff;border-radius:24px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center;margin-bottom:24px">
    <div id="result-emoji" style="font-size:64px;margin-bottom:16px"></div>
    <h2 id="result-title" style="font-size:26px;font-weight:900;color:#1A1A1A;margin-bottom:10px"></h2>
    <p id="result-desc" style="font-size:15px;color:#6B6B6B;line-height:1.6;margin-bottom:24px"></p>
    <button onclick="restart()" style="background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer">🔄 Try Again!</button>
  </div>

  <!-- Example careers -->
  <h3 style="font-size:18px;font-weight:800;color:#1A1A1A;margin-bottom:14px">🎯 Jobs you might love:</h3>
  <div id="careers" style="display:flex;flex-direction:column;gap:12px"></div>
</div>

<script>
var answers = {};
var careers = {
  artist: {
    emoji: "🎨", title: "You could be an Artist!", 
    desc: "You love making beautiful things! Artists paint pictures, draw comics, design video games, and create movies. Every toy, book, and cartoon was made by an artist!",
    jobs: [
      {e:"🎬",name:"Animator",desc:"Make cartoon characters move and come alive!"},
      {e:"🎮",name:"Game Designer",desc:"Create the levels and worlds in video games!"},
      {e:"📚",name:"Book Illustrator",desc:"Draw the pictures in children\'s books!"}
    ]
  },
  doctor: {
    emoji: "👨‍⚕️", title: "You could be a Doctor!",
    desc: "You love helping people feel better! Doctors and nurses take care of sick people, check on babies, and even help animals. Helping others is one of the most important jobs in the world!",
    jobs: [
      {e:"🏥",name:"Pediatrician",desc:"A doctor just for kids — that\'s you!"},
      {e:"🐾",name:"Veterinarian",desc:"Help sick animals feel better!"},
      {e:"🦷",name:"Dentist",desc:"Keep everyone\'s teeth healthy and bright!"}
    ]
  },
  engineer: {
    emoji: "⚙️", title: "You could be an Engineer!",
    desc: "You love building and fixing things! Engineers design bridges, build robots, create apps, and even design roller coasters. If you can imagine it, engineers can build it!",
    jobs: [
      {e:"🤖",name:"Robotics Engineer",desc:"Build actual robots that can move and think!"},
      {e:"🚀",name:"Aerospace Engineer",desc:"Design rockets and spaceships!"},
      {e:"🏗️",name:"Architect",desc:"Design houses, schools, and skyscrapers!"}
    ]
  },
  scientist: {
    emoji: "🔬", title: "You could be a Scientist!",
    desc: "You love asking questions and finding answers! Scientists explore the ocean, study animals in the wild, look at stars through telescopes, and discover new medicines. The world needs curious people like you!",
    jobs: [
      {e:"🌊",name:"Marine Biologist",desc:"Study dolphins, sharks, and coral reefs!"},
      {e:"🦕",name:"Paleontologist",desc:"Dig up dinosaur bones and learn about the past!"},
      {e:"🌍",name:"Astronomer",desc:"Study stars, planets, and the universe!"}
    ]
  }
};

function pick(q, val) {
  answers[q] = val;
  document.getElementById("q" + q).style.display = "none";
  var next = q + 1;
  if (document.getElementById("q" + next)) {
    document.getElementById("q" + next).style.display = "block";
    document.getElementById("progress").style.width = (next / 3 * 100) + "%";
  }
}

function showResult(type) {
  document.getElementById("quiz").style.display = "none";
  var r = document.getElementById("result");
  r.style.display = "block";
  var c = careers[type];
  document.getElementById("result-emoji").textContent = c.emoji;
  document.getElementById("result-title").textContent = c.title;
  document.getElementById("result-desc").textContent = c.desc;
  var colors = ["#FFE8F0","#E8F4FF","#E8FFE8","#FFF3E8"];
  var careerHtml = c.jobs.map(function(j, i) {
    return "<div style=\"background:" + colors[i % 4] + ";border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px\">" +
      "<span style=\"font-size:32px\">" + j.e + "</span>" +
      "<div><div style=\"font-size:16px;font-weight:700;color:#1A1A1A\">" + j.name + "</div>" +
      "<div style=\"font-size:13px;color:#6B6B6B;margin-top:2px\">" + j.desc + "</div></div></div>";
  }).join("");
  document.getElementById("careers").innerHTML = careerHtml;
}

function restart() {
  document.getElementById("result").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  document.getElementById("q1").style.display = "block";
  document.getElementById("q2").style.display = "none";
  document.getElementById("q3").style.display = "none";
  document.getElementById("progress").style.width = "33%";
  answers = {};
}
</script>
</body>
</html>
