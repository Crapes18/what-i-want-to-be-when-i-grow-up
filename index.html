<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Job Explorer – What do you want to be?</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text: #1A1A1A;
    --bg: #FFFFFF;
    --border: #E8E8E4;
    --accent: #FF6B35;
    --accent2: #4ECDC4;
    --accent3: #FFE66D;
    --accent4: #A78BFA;
    --soft: #F9F9F7;
    --radius: 20px;
  }

  body {
    font-family: 'Geist', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1.5px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--text);
  }
  .logo-star { font-size: 1.5rem; }
  nav .nav-links { display: flex; gap: 12px; align-items: center; }
  .nav-btn {
    padding: 9px 20px;
    border-radius: 50px;
    font-family: 'Geist', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
  }
  .nav-btn:hover { border-color: var(--text); }
  .nav-btn.primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .nav-btn.primary:hover { opacity: 0.85; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 80px 24px 60px;
    max-width: 720px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 28px;
    color: #666;
  }
  .hero h1 {
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1.5px;
  }
  .hero h1 span.highlight {
    position: relative;
    display: inline-block;
  }
  .hero h1 span.highlight::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 12px;
    background: var(--accent3);
    z-index: -1;
    border-radius: 3px;
  }
  .hero p {
    font-size: 1.15rem;
    color: #555;
    line-height: 1.65;
    max-width: 520px;
    margin: 0 auto 36px;
  }
  .hero-cta {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-big {
    padding: 15px 32px;
    border-radius: 50px;
    font-family: 'Geist', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-big.orange {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,107,53,0.3);
  }
  .btn-big.orange:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,107,53,0.4); }
  .btn-big.outline {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-big.outline:hover { border-color: var(--text); }

  .hero-emojis {
    margin-top: 52px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .emoji-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .emoji-pill span:first-child { font-size: 1.3rem; }

  /* ── SECTION WRAPPER ── */
  .section {
    padding: 80px 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 14px;
    line-height: 1.15;
  }
  .section-sub {
    font-size: 1.05rem;
    color: #666;
    margin-bottom: 48px;
    line-height: 1.6;
    max-width: 560px;
  }

  /* ── QUIZ SECTION ── */
  .quiz-wrapper {
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 680px;
    margin: 0 auto;
  }
  @media(max-width:600px) { .quiz-wrapper { padding: 32px 20px; } }

  .quiz-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 36px;
  }
  .quiz-progress-dot {
    flex: 1;
    height: 6px;
    border-radius: 10px;
    background: var(--border);
    transition: background 0.3s;
  }
  .quiz-progress-dot.done { background: var(--accent); }
  .quiz-progress-dot.active { background: var(--accent); opacity: 0.5; }

  .quiz-question {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 8px;
    line-height: 1.25;
    letter-spacing: -0.5px;
  }
  .quiz-emoji-big {
    font-size: 3rem;
    margin-bottom: 20px;
    display: block;
  }
  .quiz-hint {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 32px;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 32px;
  }
  @media(max-width:480px) { .quiz-options { grid-template-columns: 1fr; } }

  .quiz-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 12px;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Geist', sans-serif;
    text-align: center;
  }
  .quiz-option:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }
  .quiz-option.selected {
    border-color: var(--accent);
    background: #FFF3EF;
  }
  .quiz-option .opt-emoji { font-size: 2.2rem; }
  .quiz-option .opt-label { font-size: 0.9rem; font-weight: 700; color: var(--text); }
  .quiz-option .opt-sub { font-size: 0.78rem; color: #888; }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .quiz-step-label {
    font-size: 0.82rem;
    color: #999;
    font-weight: 600;
  }
  .btn-quiz-next {
    padding: 12px 28px;
    border-radius: 50px;
    background: var(--text);
    color: #fff;
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-quiz-next.ready {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-quiz-next.ready:hover { opacity: 0.85; }

  /* Quiz Result */
  .quiz-result {
    text-align: center;
  }
  .quiz-result-title {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 8px;
  }
  .quiz-result h2 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }
  .result-career-card {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin: 24px 0;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .result-career-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.07);
  }
  .result-career-card .rc-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .rc-emoji {
    font-size: 2.8rem;
    background: var(--soft);
    border-radius: 14px;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .rc-info h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
  .rc-info p { font-size: 0.85rem; color: #777; font-weight: 500; }
  .rc-match {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #EFFFF8;
    border: 1.5px solid #B6F0D4;
    color: #1A6B42;
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .rc-desc { font-size: 0.9rem; color: #555; line-height: 1.6; }
  .quiz-result .retake-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 11px 24px;
    border-radius: 50px;
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .quiz-result .retake-btn:hover { border-color: var(--text); }

  /* ── CAREER CARDS ── */
  .career-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 20px;
  }
  .career-card {
    border: 1.5px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    background: #fff;
  }
  .career-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.08);
    border-color: transparent;
  }
  .career-card-header {
    padding: 36px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .career-card-emoji {
    font-size: 3rem;
    width: 72px;
    height: 72px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }
  .career-card h3 {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .career-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--soft);
    color: #555;
  }
  .career-card-body {
    padding: 0 28px 28px;
  }
  .career-card-body p {
    font-size: 0.9rem;
    color: #666;
    line-height: 1.65;
    margin-bottom: 18px;
  }
  .career-explore-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--soft);
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .career-explore-btn:hover {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* ── CAREER MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: #fff;
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px 32px 48px;
    transform: translateY(30px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  @media(min-width:700px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 28px; max-height: 85vh; }
  }
  .modal-close {
    float: right;
    background: var(--soft);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--border); }
  .modal-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 16px;
    margin-top: 8px;
  }
  .modal h2 {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .modal-tagline {
    color: #888;
    font-size: 0.95rem;
    margin-bottom: 24px;
  }
  .modal-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 10px;
    margin-top: 24px;
  }
  .fun-facts {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .fun-fact {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .fun-fact .ff-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
  .fun-fact p { font-size: 0.88rem; color: #444; line-height: 1.55; }
  .day-in-life {
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .day-in-life h4 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .day-timeline {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .day-item {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.85rem;
  }
  .day-time {
    font-weight: 700;
    color: #888;
    width: 70px;
    flex-shrink: 0;
    font-size: 0.78rem;
  }
  .day-desc { color: #444; }

  /* ── HOW IT WORKS ── */
  .how-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .how-card {
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
  }
  .how-num {
    width: 36px;
    height: 36px;
    background: var(--text);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .how-card h4 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
  .how-card p { font-size: 0.85rem; color: #666; line-height: 1.6; }

  /* ── PAYWALL ── */
  .paywall-section {
    background: var(--soft);
    border-top: 1.5px solid var(--border);
    border-bottom: 1.5px solid var(--border);
    padding: 80px 24px;
  }
  .paywall-inner {
    max-width: 820px;
    margin: 0 auto;
  }
  .pricing-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }
  .pricing-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    position: relative;
  }
  .pricing-card.featured {
    border: 2px solid var(--text);
  }
  .featured-badge {
    position: absolute;
    top: -13px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    border-radius: 50px;
    padding: 4px 16px;
    font-size: 0.75rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .pricing-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .price-amount {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    margin: 12px 0 4px;
  }
  .price-amount sub { font-size: 1rem; font-weight: 600; vertical-align: super; }
  .price-period { font-size: 0.82rem; color: #999; margin-bottom: 20px; }
  .price-features { list-style: none; margin-bottom: 24px; }
  .price-features li {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 0.88rem;
    color: #444;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .price-features li::before {
    content: '✓';
    color: var(--accent2);
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .pricing-card .btn-price {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--soft);
    color: var(--text);
    transition: all 0.15s;
  }
  .pricing-card.featured .btn-price {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .pricing-card .btn-price:hover { opacity: 0.8; }
  .pricing-note {
    text-align: center;
    color: #999;
    font-size: 0.82rem;
    margin-top: 20px;
  }

  /* ── PARENT DASHBOARD ── */
  .dashboard-preview {
    background: var(--soft);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    margin-top: 40px;
  }
  .dashboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .dashboard-header h3 { font-size: 1.1rem; font-weight: 800; }
  .child-selector {
    display: flex;
    gap: 8px;
  }
  .child-pill {
    padding: 6px 14px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    transition: all 0.15s;
  }
  .child-pill.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  @media(max-width:480px) { .dash-stats { grid-template-columns: 1fr 1fr; } }
  .dash-stat {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    text-align: center;
  }
  .dash-stat .stat-val {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 2px;
  }
  .dash-stat .stat-label { font-size: 0.78rem; color: #888; font-weight: 600; }
  .explored-list { display: flex; flex-direction: column; gap: 10px; }
  .explored-item {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .explored-item .ei-emoji { font-size: 1.6rem; }
  .explored-item .ei-info { flex: 1; }
  .explored-item .ei-info h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
  .explored-item .ei-info p { font-size: 0.78rem; color: #888; }
  .ei-stars { font-size: 0.85rem; }

  /* ── FOOTER ── */
  footer {
    border-top: 1.5px solid var(--border);
    padding: 40px 32px;
    text-align: center;
  }
</style>
<body>
</body>
</html>
