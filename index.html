<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Will I Be? 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #1A1A1A;
    --white: #FFFFFF;
    --border: #E8E8E4;
    --purple: #7C3AED;
    --purple-light: #EDE9FE;
    --yellow: #FCD34D;
    --yellow-light: #FFFBEB;
    --green: #10B981;
    --green-light: #ECFDF5;
    --pink: #F472B6;
    --pink-light: #FDF2F8;
    --orange: #F97316;
    --orange-light: #FFF7ED;
    --blue: #3B82F6;
    --blue-light: #EFF6FF;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo .emoji { font-size: 22px; }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }
  .nav-btn-ghost {
    background: transparent;
    color: var(--black);
  }
  .nav-btn-ghost:hover { background: var(--border); }
  .nav-btn-primary {
    background: var(--black);
    color: var(--white);
  }
  .nav-btn-primary:hover { opacity: 0.85; }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* HERO */
  #section-home {
    display: block;
  }
  .hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 24px 60px;
    text-align: center;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--yellow-light);
    border: 1px solid #FDE68A;
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #92400E;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 20px;
    color: var(--black);
  }
  .hero h1 span { color: var(--purple); }
  .hero p {
    font-size: clamp(16px, 2.5vw, 20px);
    color: #555;
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.6;
  }
  .hero-cta {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 60px;
  }
  .btn-big {
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-big-primary {
    background: var(--purple);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-big-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.4); }
  .btn-big-secondary {
    background: var(--white);
    color: var(--black);
    border: 1.5px solid var(--border);
  }
  .btn-big-secondary:hover { border-color: #ccc; background: #fafafa; }

  /* EMOJI CAROUSEL */
  .emoji-strip {
    display: flex;
    gap: 0;
    overflow: hidden;
    margin-bottom: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .emoji-strip-inner {
    display: flex;
    animation: scroll-strip 20s linear infinite;
  }
  .emoji-card-mini {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 20px 28px;
    border-right: 1px solid var(--border);
    min-width: 110px;
    flex-shrink: 0;
  }
  .emoji-card-mini .e { font-size: 28px; }
  .emoji-card-mini .label { font-size: 11px; font-weight: 500; color: #888; white-space: nowrap; }
  @keyframes scroll-strip {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* HOW IT WORKS */
  .how-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 24px;
  }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
  }
  .how-section h2 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
  }
  .step-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    transition: border-color 0.2s;
  }
  .step-card:hover { border-color: #bbb; }
  .step-num {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--black);
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .step-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .step-card p { font-size: 14px; color: #666; line-height: 1.5; }

  /* QUIZ SECTION */
  #section-quiz {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .quiz-header { text-align: center; margin-bottom: 40px; }
  .quiz-header h2 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }
  .quiz-header p { font-size: 16px; color: #666; }

  /* Progress bar */
  .quiz-progress-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 8px;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .quiz-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  /* Question */
  .quiz-question-wrap { display: none; }
  .quiz-question-wrap.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-emoji { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .question-text {
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 700;
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .choice-btn {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--black);
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .choice-btn .choice-emoji { font-size: 28px; }
  .choice-btn:hover {
    border-color: var(--purple);
    background: var(--purple-light);
    transform: translateY(-2px);
  }
  .choice-btn.selected {
    border-color: var(--purple);
    background: var(--purple-light);
  }

  /* RESULT */
  #section-result {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .result-header { text-align: center; margin-bottom: 40px; }
  .result-header .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-header h2 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .result-header p { font-size: 16px; color: #666; }

  .career-result-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .career-result-card:hover { border-color: #bbb; }
  .career-result-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }
  .career-result-icon {
    font-size: 44px;
    width: 72px;
    height: 72px;
    background: var(--purple-light);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .career-result-info h3 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .career-result-info .match-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-light);
    color: #065F46;
    border-radius: 100px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .career-result-desc {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .career-facts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }
  .career-fact {
    background: #F9F9F8;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .career-fact .fact-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 4px;
  }
  .career-fact .fact-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
  }
  .career-activities {
    margin-top: 20px;
  }
  .career-activities h4 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 12px;
  }
  .activity-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .activity-tag {
    background: var(--purple-light);
    color: var(--purple);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 32px;
  }
  .btn-full {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-full-primary { background: var(--purple); color: var(--white); }
  .btn-full-primary:hover { opacity: 0.9; }
  .btn-full-secondary {
    background: var(--white);
    color: var(--black);
    border: 1.5px solid var(--border);
  }
  .btn-full-secondary:hover { border-color: #bbb; }

  /* CAREERS SECTION */
  #section-careers {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .careers-header { margin-bottom: 36px; }
  .careers-header h2 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .careers-header p { font-size: 15px; color: #666; }
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .filter-chip {
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: #555;
    transition: all 0.15s;
  }
  .filter-chip.active, .filter-chip:hover {
    border-color: var(--purple);
    background: var(--purple-light);
    color: var(--purple);
  }
  .careers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .career-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .career-card:hover {
    border-color: var(--purple);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .career-card-emoji { font-size: 36px; margin-bottom: 12px; }
  .career-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .career-card p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 14px; }
  .career-card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .career-card-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 6px;
  }
  .tag-creative { background: var(--pink-light); color: #9D174D; }
  .tag-science { background: var(--blue-light); color: #1E40AF; }
  .tag-helping { background: var(--green-light); color: #065F46; }
  .tag-adventure { background: var(--orange-light); color: #C2410C; }
  .tag-tech { background: var(--purple-light); color: #5B21B6; }
  .tag-animals { background: #FFF7ED; color: #C2410C; }

  /* CAREER DETAIL MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--white);
    border-radius: 20px;
    padding: 36px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .modal-emoji { font-size: 56px; margin-bottom: 16px; }
  .modal-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .modal-tagline { font-size: 15px; color: #666; margin-bottom: 24px; }
  .modal-desc { font-size: 15px; color: #444; line-height: 1.7; margin-bottom: 24px; }
  .modal-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 12px;
  }
  .modal-fun-facts {
    list-style: none;
    margin-bottom: 24px;
  }
  .modal-fun-facts li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: #555;
    line-height: 1.5;
  }
  .modal-fun-facts li:last-child { border-bottom: none; }
  .modal-fun-facts li .star { flex-shrink: 0; }
  .modal-try-now {
    background: var(--purple);
    color: var(--white);
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: none;
    margin-top: 8px;
  }
  .modal-try-now:hover { opacity: 0.9; }

  /* PRICING */
  #section-pricing {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .pricing-header { text-align: center; margin-bottom: 48px; }
  .pricing-header h2 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }
  .pricing-header p { font-size: 16px; color: #666; }
  .pricing-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }
  .pricing-card {
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
  }
  .pricing-card.featured {
    border-color: var(--purple);
    background: var(--purple-light);
  }
  .pricing-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--purple);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
  }
  .pricing-card h3 { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; }
  .pricing-price {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 4px;
  }
  .pricing-price span { font-size: 16px; font-weight: 500; color: #888; letter-spacing: 0; }
  .pricing-desc { font-size: 13px; color: #888; margin-bottom: 24px; }
  .pricing-features { list-style: none; margin-bottom: 28px; }
  .pricing-features li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .pricing-features li:last-child { border-bottom: none; }
  .pricing-features .check { color: var(--green); font-size: 16px; }
  .pricing-cta {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .pricing-cta-primary { background: var(--purple); color: var(--white); }
  .pricing-cta-primary:hover { opacity: 0.9; }
  .pricing-cta-secondary { background: var(--white); color: var(--black); border: 1.5px solid var(--border); }
  .pricing-cta-secondary:hover { border-color: #bbb; }

  /* PARENT DASHBOARD */
  #section-dashboard {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .dashboard-header { margin-bottom: 36px; }
  .dashboard-header h2 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .dashboard-header p { font-size: 15px; color: #666; }
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .dash-stat {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .dash-stat-emoji { font-size: 24px; margin-bottom: 10px; }
  .dash-stat-num {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .dash-stat-label { font-size: 13px; color: #888; }
  .dash-section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }
  .explored-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .explored-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--white);
  }
  .explored-item-emoji { font-size: 24px; }
  .explored-item-info { flex: 1; }
  .explored-item-info h4 { font-size: 14px; font-weight: 600; }
</style>
<body>
<p style="font-family:sans-serif;padding:32px">Prototype is loading...</p>

</body>
</html>
