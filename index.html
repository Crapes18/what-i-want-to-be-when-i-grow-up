<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Job Explorer 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Geist",sans-serif;background:#FEF9F0;min-height:100vh;overflow-x:hidden}
.btn{border:none;cursor:pointer;font-family:inherit;transition:transform 0.1s,opacity 0.1s}
.btn:active{transform:scale(0.97)}
.hidden{display:none!important}
.ans-btn{width:100%;background:#fff;border:3px solid transparent;border-radius:18px;padding:16px 20px;text-align:left;font-size:17px;font-weight:600;cursor:pointer;color:#1A1A1A;display:flex;align-items:center;gap:14px;transition:all 0.15s;font-family:inherit}
.ans-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.ans-btn.selected{border-color:#FF6B6B;background:#FFF0F0}
</style>
</head>
<body>

<!-- SCREEN 1: Welcome -->
<div id="s-welcome" style="min-height:100vh;background:linear-gradient(160deg,#FF6B6B 0%,#FF8E53 40%,#FFD93D 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center">
  <div style="font-size:80px;margin-bottom:16px;animation:bounce 2s infinite">🌟</div>
  <h1 style="color:#fff;font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:12px;text-shadow:0 2px 12px rgba(0,0,0,0.15)">What do you want to be?</h1>
  <p style="color:rgba(255,255,255,0.92);font-size:18px;margin-bottom:40px;max-width:340px;line-height:1.5">Answer 3 fun questions and discover amazing jobs just for you!</p>
  <button class="btn" onclick="show('s-q1')" style="background:#fff;color:#FF6B6B;border:none;border-radius:99px;padding:18px 44px;font-size:20px;font-weight:800;box-shadow:0 8px 32px rgba(0,0,0,0.15)">Let's Go! 🚀</button>
</div>

<!-- SCREEN 2: Q1 -->
<div id="s-q1" class="hidden" style="min-height:100vh;display:flex;flex-direction:column;padding:32px 24px;max-width:520px;margin:0 auto;width:100%">
  <div style="display:flex;gap:8px;margin-bottom:32px">
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#E8E8E4;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#E8E8E4;border-radius:99px"></div>
  </div>
  <div style="font-size:52px;margin-bottom:16px">🤔</div>
  <h2 style="font-size:26px;font-weight:800;color:#1A1A1A;margin-bottom:8px;letter-spacing:-0.5px">What do you love doing most?</h2>
  <p style="color:#888;font-size:15px;margin-bottom:28px">Pick your favourite!</p>
  <div style="display:flex;flex-direction:column;gap:12px">
    <button class="ans-btn" onclick="pickQ1('art')"><span style="font-size:28px">🎨</span><div><div>Drawing and making things</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Art, crafts, building</div></div></button>
    <button class="ans-btn" onclick="pickQ1('science')"><span style="font-size:28px">🔬</span><div><div>Doing experiments and asking why</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Science, experiments, nature</div></div></button>
    <button class="ans-btn" onclick="pickQ1('help')"><span style="font-size:28px">🤝</span><div><div>Helping people and animals</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Caring, teamwork, kindness</div></div></button>
    <button class="ans-btn" onclick="pickQ1('build')"><span style="font-size:28px">🏗️</span><div><div>Building and fixing things</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Lego, tools, machines</div></div></button>
  </div>
</div>

<!-- SCREEN 3: Q2 -->
<div id="s-q2" class="hidden" style="min-height:100vh;display:flex;flex-direction:column;padding:32px 24px;max-width:520px;margin:0 auto;width:100%">
  <div style="display:flex;gap:8px;margin-bottom:32px">
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#E8E8E4;border-radius:99px"></div>
  </div>
  <div style="font-size:52px;margin-bottom:16px">🌍</div>
  <h2 style="font-size:26px;font-weight:800;color:#1A1A1A;margin-bottom:8px;letter-spacing:-0.5px">Where would you love to work?</h2>
  <p style="color:#888;font-size:15px;margin-bottom:28px">Pick your dream place!</p>
  <div style="display:flex;flex-direction:column;gap:12px">
    <button class="ans-btn" onclick="pickQ2('outside')"><span style="font-size:28px">🌳</span><div><div>Outside in nature</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Parks, oceans, forests</div></div></button>
    <button class="ans-btn" onclick="pickQ2('stage')"><span style="font-size:28px">🎭</span><div><div>On a stage or in a studio</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Performing, creating, sharing</div></div></button>
    <button class="ans-btn" onclick="pickQ2('people')"><span style="font-size:28px">🏥</span><div><div>With lots of people</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Schools, hospitals, teams</div></div></button>
    <button class="ans-btn" onclick="pickQ2('lab')"><span style="font-size:28px">🔭</span><div><div>In a lab or workshop</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Gadgets, experiments, inventions</div></div></button>
  </div>
</div>

<!-- SCREEN 4: Q3 -->
<div id="s-q3" class="hidden" style="min-height:100vh;display:flex;flex-direction:column;padding:32px 24px;max-width:520px;margin:0 auto;width:100%">
  <div style="display:flex;gap:8px;margin-bottom:32px">
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
    <div style="height:8px;flex:1;background:#FF6B6B;border-radius:99px"></div>
  </div>
  <div style="font-size:52px;margin-bottom:16px">⚡</div>
  <h2 style="font-size:26px;font-weight:800;color:#1A1A1A;margin-bottom:8px;letter-spacing:-0.5px">What's your superpower?</h2>
  <p style="color:#888;font-size:15px;margin-bottom:28px">Almost done — what are you best at?</p>
  <div style="display:flex;flex-direction:column;gap:12px">
    <button class="ans-btn" onclick="showResult('artist')"><span style="font-size:28px">✨</span><div><div>Making beautiful things</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Creativity and imagination</div></div></button>
    <button class="ans-btn" onclick="showResult('doctor')"><span style="font-size:28px">💊</span><div><div>Making people feel better</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Caring and helping</div></div></button>
    <button class="ans-btn" onclick="showResult('engineer')"><span style="font-size:28px">⚙️</span><div><div>Figuring out how things work</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Problem solving and building</div></div></button>
    <button class="ans-btn" onclick="showResult('scientist')"><span style="font-size:28px">🔬</span><div><div>Discovering new things</div><div style="font-size:13px;color:#888;font-weight:400;margin-top:2px">Curiosity and exploring</div></div></button>
  </div>
</div>

<!-- SCREEN 5: Result -->
<div id="s-result" class="hidden" style="min-height:100vh;padding:32px 24px;max-width:520px;margin:0 auto;width:100%">
  <div id="result-hero" style="border-radius:28px;padding:32px 28px;text-align:center;margin-bottom:24px">
    <div id="result-emoji" style="font-size:72px;margin-bottom:16px"></div>
    <h2 id="result-title" style="font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:12px"></h2>
    <p id="result-desc" style="font-size:16px;line-height:1.6;opacity:0.85"></p>
  </div>

  <h3 style="font-size:17px;font-weight:800;color:#1A1A1A;margin-bottom:14px">🎯 Jobs you might love:</h3>
  <div id="result-jobs" style="display:flex;flex-direction:column;gap:12px;margin-bottom:32px"></div>

  <button class="btn" onclick="restart()" style="width:100%;background:#1A1A1A;color:#fff;border:none;border-radius:18px;padding:18px;font-size:17px;font-weight:700">🔄 Try Again!</button>
</div>

<style>
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>

<script>
var RESULTS={
  artist:{emoji:"🎨",title:"You could be an Artist!",color:"#FF6B6B",bg:"#FFF0F0",desc:"You love making beautiful things! Artists paint, draw comics, design video games, and create movies. Every cartoon, toy, and book cover was made by an artist!",
    jobs:[{e:"🎬",n:"Animator",d:"Make cartoon characters move and come alive!"},{e:"🎮",n:"Game Designer",d:"Create the levels and worlds in video games!"},{e:"📚",n:"Book Illustrator",d:"Draw the pictures in children's books!"}]},
  doctor:{emoji:"👨‍⚕️",title:"You could be a Doctor!",color:"#4ECDC4",bg:"#F0FFFE",desc:"You love helping people feel better! Doctors and nurses take care of sick people and even help animals. Helping others is one of the most important jobs in the world!",
    jobs:[{e:"🏥",n:"Pediatrician",d:"A doctor just for kids — like you!"},{e:"🐾",n:"Veterinarian",d:"Help sick animals feel better!"},{e:"🦷",n:"Dentist",d:"Keep everyone's teeth healthy and bright!"}]},
  engineer:{emoji:"⚙️",title:"You could be an Engineer!",color:"#FF8E53",bg:"#FFF5F0",desc:"You love building and fixing things! Engineers design bridges, build robots, make apps, and even design roller coasters. If you can imagine it, engineers can build it!",
    jobs:[{e:"🤖",n:"Robotics Engineer",d:"Build actual robots that move and think!"},{e:"🚀",n:"Aerospace Engineer",d:"Design rockets and spaceships!"},{e:"🏗️",n:"Architect",d:"Design houses, schools, and skyscrapers!"}]},
  scientist:{emoji:"🔬",title:"You could be a Scientist!",color:"#A78BFA",bg:"#F5F0FF",desc:"You love asking questions and finding answers! Scientists explore the ocean, study animals, look at stars, and discover new medicines. The world needs curious people like you!",
    jobs:[{e:"🌊",n:"Marine Biologist",d:"Study dolphins, sharks, and coral reefs!"},{e:"🦕",n:"Paleontologist",d:"Dig up dinosaur bones and learn about the past!"},{e:"🌍",n:"Astronomer",d:"Study stars, planets, and the universe!"}]}
};

function show(id){
  ["s-welcome","s-q1","s-q2","s-q3","s-result"].forEach(function(s){
    var el=document.getElementById(s);
    if(el){el.classList.add("hidden")}
  });
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo(0,0);
}

function pickQ1(v){window._q1=v;show("s-q2")}
function pickQ2(v){window._q2=v;show("s-q3")}

function showResult(type){
  var r=RESULTS[type];
  var hero=document.getElementById("result-hero");
  hero.style.background=r.bg;
  hero.style.color=r.color;
  document.getElementById("result-emoji").textContent=r.emoji;
  document.getElementById("result-title").textContent=r.title;
  document.getElementById("result-title").style.color=r.color;
  document.getElementById("result-desc").textContent=r.desc;
  document.getElementById("result-desc").style.color=r.color;
  var bgs=["#FFF0F4","#F0FFFE","#FFF5F0","#F5F0FF"];
  document.getElementById("result-jobs").innerHTML=r.jobs.map(function(j,i){
    return"<div style=\"background:"+bgs[i%4]+";border-radius:18px;padding:18px 20px;display:flex;align-items:center;gap:16px\"><span style=\"font-size:36px\">"+j.e+"</span><div><div style=\"font-size:16px;font-weight:700;color:#1A1A1A\">"+j.n+"</div><div style=\"font-size:13px;color:#888;margin-top:3px\">"+j.d+"</div></div></div>";
  }).join("");
  show("s-result");
}

function restart(){show("s-welcome")}
</script>
</body>
</html>
