<!-- CATEGORIES -->

<!-- CAREER LIST -->

  <div id="list-grid"></div>
</div>

<!-- CAREER DETAIL -->
<div id="screen-detail" class="hidden" style="padding:24px;max-width:580px;margin:0 auto">
  <button class="back-btn" id="detail-back">← Back</button>

<div id="screen-q1" class="hidden"></div>
<div id="screen-q2" class="hidden"></div>
<div id="screen-q3" class="hidden"></div>

  <h3 id="result-jobs-title" style="font-size:16px;font-weight:800;color:#1A1A1A;margin-bottom:12px"></h3>

  <div style="display:flex;gap:10px;margin-bottom:20px">
    <button class="btn" id="btn-retry" style="flex:1;background:#1A1A1A;color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:700"></button>
    <button class="btn" id="btn-explore-result" style="flex:1;background:#F0E8FF;color:#6600BB;border-radius:14px;padding:14px;font-size:15px;font-weight:700"></button>
  </div>
</div>

<!-- ATTRIBUTION FOOTER -->

</div>

eady for the next call.","skills":["Physical fitness","Teamwork","Staying calm under pressure","First aid"],"funFact":"Firefighters can be called to over 30 different types of emergencies, not just fires!","education":"High School Diploma","future":false,"wage":"$53,240/yr"},{"id":"chef","cat":"builders","emoji":"👨‍🍳","name":"Chef","short":"Create amazing meals that make people happy!","detail":"Chefs design menus and cook incredible food in restaurants and on TV. A great meal can make someone feel wonderful!","typicalDay":"Arrive at the restaurant and check fresh ingredients. Plan the day's menu with the team. Start cooking and tasting to make sure everything is delicious. Watch happy guests enjoy your food!","skills":["Creativity","Tasting and smell","Knife skills","Team leadership"],"funFact":"Some chefs travel the whole world just to learn new recipes and cooking techniques!","education":"No Degree Required","future":false,"wage":"$59,430/yr"},{"id":"data","cat":"discoverers","emoji":"📊","name":"Data Scientist","short":"Find hidden patterns in huge amounts of data!","detail":"Data scientists use math and computers to find patterns that help companies make smarter decisions. One of the fastest growing jobs!","typicalDay":"Open your computer and look at millions of numbers. Write code to find patterns nobody else can see. Create colorful charts to show what you discovered. Tell your team what the data says!","skills":["Math","Computer coding","Curiosity","Explaining ideas clearly"],"funFact":"Netflix uses data science to pick which shows to make — so data scientists helped create your favorite shows!","education":"Bachelor's Degree","future":true,"wage":"$108,020/yr"},{"id":"cybersecurity","cat":"discoverers","emoji":"🛡️","name":"Cybersecurity Analyst","short":"Protect computers from hackers!","detail":"Cybersecurity analysts are digital superheroes who stop hackers and keep computers safe. This job is growing super fast!","typicalDay":"Check the computer systems bots that perform surgery, explore Mars, and build cars. As robots get smarter, this job keeps growing!","typicalDay":"Sketch a new robot design on the computer. Build parts in the workshop with special machines. Program the robot to move and think. Test it and watch it do something amazing!","skills":["Engineering","Computer programming","Math","Creative thinking"],"funFact":"The Mars rovers are robots built by engineers — they have been exploring Mars for over 20 years!","education":"Bachelor's Degree","future":true,"wage":"$104,600/yr"},{"id":"game","cat":"creators","emoji":"🎮","name":"Game Designer","short":"Create the worlds and adventures in video games!","detail":"Game designers invent entire worlds for people to explore. Your favorite games were made by a team of passionate designers!","typicalDay":"Draw ideas for new characters and levels in your sketchbook. Meet with the art team to bring your ideas to life. Play the game to test if it is fun. Make changes until it feels just right!","skills":["Creativity","Storytelling","Drawing","Understanding what makes things fun"],"funFact":"The video game industry makes more money than movies and music combined!","education":"Bachelor's Degree","future":true,"wage":"$132,270/yr"},{"id":"animator","cat":"creators","emoji":"🎬","name":"Animator","short":"Bring cartoon characters to life!","detail":"Animators make characters move by drawing or using computers. Every Pixar movie and cartoon character was brought to life by an animator!","typicalDay":"Review the scene you need to animate today. Draw or move the character one tiny step at a time — sometimes hundreds of drawings for one second! Watch it play back and adjust until it looks perfect.","skills":["Drawing","Attention to detail","Storytelling","Patience"],"funFact":"One second of animation in a Pixar movie can take weeks to create!","education":"Bachelor's Degree","future":false,"wage":"$106,810/yr"},{"id":"architect","cat":"creators","emoji":"🏗️","name":"Architect","short":"Design beautiful buildings and skyscrapers!","detail":"Architects draw plans for buildings before they are built. They decide how a building looks, how rooms fit together, and how to make it safe.","typicalDay":"Meet with clients to hear what they want. Sketch the building design on paper and the computer. Calculate if the structure will be safe and strong. Watch your design slowly become a real building!","skills":["Drawing","Math","Creative thinking","Problem solving"],"funFact":"The ancient pyramids of Egypt are over 4,000 years old — and architects still study them today!","education":"Bachelor's Degree","future":false,"wage":"$95,560/yr"},{"id":"uxdesigner","cat":"creators","emoji":"📱","name":"UX Designer","short":"Design apps so they are fun and easy to use!","detail":"UX designers decide how apps look and feel. Every app you love had a UX designer who made sure the buttons were easy to find!","typicalDay":"Talk to real people to find out what confuses them about an app. Sketch new designs on paper. Build a simple version and watch people use it. Make improvements based on what you learn!","skills":["Empathy","Drawing","Problem solving","Understanding people"],"funFact":"A good UX designer can make an app 10 times faster to use just by moving one button!","education":"Bachelor's Degree","future":true,"wage":"$103,220/yr"},{"id":"photographer","cat":"creators","emoji":"📸","name":"Photographer","short":"Capture amazing moments with a camera!","detail":"Photographers take pictures at weddings, sports events, and for magazines. Wildlife photographers travel to jungles to capture animals!","typicalDay":"Pack your camera and lenses. Travel to an amazing location — maybe a wedding, a sports game, or a jungle! Wait patiently for the perfect moment. Click! Edit the photos to make them look beautiful.","skills":["Patience","Creativity","Technical camera knowledge","Storytelling through images"],"funFact":"Wildlife photographers sometimes wait in the same spot for days just to get one perfect shot!","education":"No Degree Required","future":false,"wage":"$40,760/yr"},{"id":"nurse","cat":"helpers","emoji":"👩‍⚕️","name":"Nurse Practitioner","short":"Diagnose and treat patients just like a doctor!","detail":"Nurse practitioners examine patients, figure out what is wrong, and give medicine to make them better. One of the fastest growing jobs!","typicalDay":"See patients one by one — listen to their hearts, check their temperature, ask how they feel. Figure out what might be wrong. Prescribe medicine or treatment. Make sure they leave feeling cared for!","skills":["Caring for others","Science","Listening","Staying calm"],"funFact":"Nurse practitioners see more patients every year than many doctors and often spend more time with each one!","education":"Master's Degree","future":true,"wage":"$129,210/yr"},{"id":"speech","cat":"helpers","emoji":"🗣️","name":"Speech Therapist","short":"Help people who have trouble speaking!","detail":"Speech therapists help kids and adults learn to speak clearly using fun games and exercises. They are incredibly patient helpers!","typicalDay":"Work with a child using fun games to practice sounds. Teach tongue exercises that strengthen mouth muscles. Celebrate every small improvement — saying one word correctly is a big victory!","skills":["Patience","Creativity with games","Science of language","Encouragement"],"funFact":"Speech therapists also help people learn to swallow safely after an injury — it is more complex than you think!","education":"Master's Degree","future":true,"wage":"$89,290/yr"},{"id":"teacher","cat":"helpers","emoji":"📚","name":"Teacher","short":"Help kids learn and discover the world!","detail":"Teachers help kids read, do math, and understand history. A great teacher can change a life forever — one of the most important jobs in the world!","typicalDay":"Prepare fun lessons the night before. Greet every student at the door with a smile. Teach, ask questions, and watch the moment something clicks for a student. Grade work and plan tomorrow!","skills":["Patience","Explaining clearly","Creativity","Caring about people"],"funFact":"The average teacher inspires over 3,000 students in their career — that is a lot of lives changed!","education":"Bachelor's Degree","future":false,"wage":"$65,220/yr"},{"id":"vet","cat":"helpers","emoji":"🐾","name":"Veterinarian","short":"Take care of sick and injured animals!","detail":"Veterinarians are doctors for animals — from puppies to zoo animals. They diagnose illnesses, do surgeries, and keep animals healthy!","typicalDay":"Check in nervous puppies getting their vaccines. Examine a cat with a sore paw. Perform surgery on an animal that needs help. See happy owners take their healthy pets back home!","skills":["Love of animals","Science","Steady hands","Calming nervous animals"],"funFact":"Zoo vets sometimes have to perform surgery on animals like elephants and giraffes!","education":"Doctorate","future":false,"wage":"$119,100/yr"},{"id":"socialworker","cat":"helpers","emoji":"🏡","name":"Social Worker","short":"Help families going through tough times!","detail":"Social workers connect families with food, housing, and support. They make sure children are safe and help adults through hard situations.","typicalDay":"Visit a family to check that children are safe and happy. Connect a struggling parent with free food and housing help. Talk with kids to make sure they feel loved. Write reports to keep records of who you helped.","skills":["Empathy","Listening","Problem solving","Staying strong emotionally"],"funFact":"Social workers helped create many of the safety programs that millions of families depend on today!","education":"Bachelor's Degree","future":true,"wage":"$58,380/yr"},{"id":"healthmanager","cat":"leaders","emoji":"🏥","name":"Health Manager","short":"Run hospitals so everything works perfectly!","detail":"Health managers keep hospitals and clinics running. They manage staff and budgets to make sure patients get excellent care. Growing fast!","typicalDay":"Meet with doctors and nurses to solve problems. Check that the hospital has enough medicines and equipment. Review patient feedback to improve care. Plan how to make the hospital even better!","skills":["Organization","Leadership","Problem solving","Understanding medical systems"],"funFact":"A big hospital is like a small city — it needs managers to keep hundreds of workers and systems running smoothly!","education":"Bachelor's Degree","future":true,"wage":"$110,680/yr"},{"id":"entrepreneur","cat":"leaders","emoji":"💡","name":"Entrepreneur","short":"Start your own business and make your ideas real!","detail":"Entrepreneurs see a problem and build a business to solve it. Every big company started with one person who believed in their dream!","typicalDay":"Wake up excited about your idea. Meet with your team and solve problems together. Talk to customers to understand what they need. Make decisions that shape the future of your company!","skills":["Creativity","Bravery","Problem solving","Never giving up"],"funFact":"Mark Zuckerberg started Facebook in his college dorm room — now it has over 3 billion users!","education":"No Degree Required","future":false,"wage":"Varies"},{"id":"coach","cat":"leaders","emoji":"🏆","name":"Sports Coach","short":"Train athletes and help your team win!","detail":"Sports coaches teach skills, develop strategies, and motivate teams to give their best. Great coaches make great champions!","typicalDay":"Run practice drills to sharpen skills. Watch video footage of last game to find ways to improve. Give a motivating speech before the big match. Cheer your team on and make adjustments during the game!","skills":["Understanding the sport","Leadership","Communication","Reading people"],"funFact":"The greatest coaches often say winning is not about talent — it is about teaching teamwork!","education":"Bachelor's Degree","future":false,"wage":"$48,140/yr"},{"id":"lawyer","cat":"leaders", // ── Screen router ─────────────────────────────────────────────────────────────
var SCREENS = ["home","categories","list","detail","q1","q2","q3","result"];
function show(name) {
  SCREENS.forEach(function(s) {
    var el = document.getElementById("screen-" + s);
    if (el) el.classList.add("hidden");
  });
  var target = document.getElementById("screen-" + name);
  if (target) target.classList.remove("hidden");
  window.scrollTo(0, 0);
}

// ── Quiz state ────────────────────────────────────────────────────────────────
var quizAnswers = [];

// ── Build home screen ─────────────────────────────────────────────────────────
function buildHome() {
  var h = APP_DATA.home;
  if (document.getElementById("home-emoji")) document.getElementById("home-emoji").textContent = h.emoji || "🌟";
  document.getElementById("home-title").textContent = h.title;
  document.getElementById("home-subtitle").textContent = h.subtitle;
  var btnQuiz = document.getElementById("btn-quiz");
  btnQuiz.textContent = h.quiz_button || "Take the Quiz! ✨";
  btnQuiz.addEventListener("click", function() { show("q1"); });
  var btnExplore = document.getElementById("btn-explore");
  btnExplore.textContent = h.explore_button || "Explore All Jobs 🗺️";
  btnExplore.addEventListener("click", function() { show("categories"); });
}

// ── Build categories screen ───────────────────────────────────────────────────
function buildCategories() {
  document.getElementById("cat-title").textContent = APP_DATA.categories_screen.title || "Pick a Category";
  document.getElementById("cat-subtitle").textContent = APP_DATA.categories_screen.subtitle || "Tap any to see the jobs inside";
  document.getElementById("cat-back").addEventListener("click", function() { show("home"); });

  var grid = document.getElementById("cat-grid");
  APP_DATA.categories.forEach(function(cat) {
    var btn = document.createElement("button");
    btn.className = "btn";
    btn.style.cssText = "background:" + cat.bg + ";border:none;border-radius:20px;padding:20px 16px;text-align:left;cursor:pointer;width:100%";
    btn.innerHTML = '<div style="font-size:36px;margin-bottom:8px">' + cat.emoji + '</div>' +
      '<div style="font-size:16px;font-weight:800;color:' + cat.color + '">' + cat.name + '</div>' +
      '<div style="font-size:12px;color:#888;margin-top:2px">' + (cat.tagline || "") + '</div>';
    btn.setAttribute("data-catid", cat.id);
    btn.addEventListener("click", function() { showCategory(this.getAttribute("data-catid")); });
    grid.appendChild(btn);
  });
}

// ── Show a category's career list ─────────────────────────────────────────────
function showCategory(catId) {
  var cat = APP_DATA.categories.find(function(c) { return c.id === catId; });
  if (!cat) return;

  document.getElementById("list-header").innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;padding:16px 20px;background:' + cat.bg + ';border-radius:16px;margin-bottom:4px">' +
    '<span style="font-size:36px">' + cat.emoji + '</span>' +
    '<div><div style="font-size:20px;font-weight:800;color:' + cat.color + '">' + cat.name + '</div>' +
    '<div style="font-size:13px;color:#888">Tap any job to learn more</div></div></div>';

  var grid = document.getElementById("list-grid");
  grid.innerHTML = "";
  APP_DATA.careers.filter(function(c) { return c.cat === catId; }).forEach(function(job) {
    var btn = document.createElement("button");
    btn.className = "btn";
    btn.style.cssText = "background:#fff;border:1px solid #E8E8E4;border-radius:14px;padding:16px;text-align:left;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;margin-bottom:8px";
    btn.innerHTML = '<span style="font-size:32px;flex-shrink:0">' + job.emoji + '</span>' +
      '<div style="flex:1;min-width:0">' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
      '<span style="font-size:15px;font-weight:700;color:#1A1A1A">' + job.name + '</span>' +
      (job.future ? '<span style="font-size:10px;font-weight:700;background:#FFD93D;color:#664400;padding:2px 7px;border-radius:99px">FUTURE JOB</span>' : "") +
      '</div><div style="font-size:13px;color:#888;margin-top:3px">' + job.short + '</div></div>';
    btn.setAttribute("data-jobid", job.id);
    btn.addEventListener("click", function() { showDetail(this.getAttribute("data-jobid")); });
    grid.appendChild(btn);
  });

  document.getElementById("list-back").onclick = function() { show("categories"); };
  document.getElementById("detail-back").onclick = function() { show("list"); };
  show("list");
}

// ── Show career detail ─────────────────────────────────────────────────────────
function showDetail(jobId) {

  var cat = APP_DATA.categories.find(function(c) { return c.id === job.cat; });

  var richSections = "";

    richSections += '<div style="background:#F8F8F6;border-radius:14px;padding:16px 18px;margin-bottom:12px">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#A0A0A0;margin-bottom:8px">A Typical Day</div>' +

    '<h2 style="font-size:24px;font-weight:900;color:' + cat.color + ';margin-bottom:8px">' + job.name + '</h2>' +
    '<p style="font-size:15px;color:' + cat.color + ';opacity:0.85;line-height:1.6">' + job.detail + '</p></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">' +
    '<div style="background:#F8F8F6;border-radius:12px;padding:12px;text-align:center">' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#A0A0A0;margin-bottom:4px">Category</div>' +
    '<div style="font-size:13px;font-weight:700">' + cat.emoji + " " + cat.name + '</div></div>' +
    '<div style="background:#F8F8F6;border-radius:12px;padding:12px;text-align:center">' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#A0A0A0;margin-bottom:4px">Avg Salary</div>' +
    '<div style="font-size:13px;font-weight:700">' + (job.wage || "Varies") + '</div></div>' +
    '<div style="background:#F8F8F6;border-radius:12px;padding:12px;text-align:center">' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#A0A0A0;margin-bottom:4px">Education</div>' +
    '<div style="font-size:12px;font-weight:700">' + (job.education || "Varies") + '</div></div></div>' +
    richSections +
    '<button class="btn" id="detail-explore-more" style="width:100%;background:#1A1A1A;color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:700;margin-top:4px">Explore More Jobs</button>';

  document.getElementById("detail-explore-more").addEventListener("click", function() { show("categories"); });
  show("detail");
}

// ── Build quiz screens ────────────────────────────────────────────────────────
function buildQuiz() {
  var bars = ["", "one", "two", "three"];
  APP_DATA.quiz.forEach(function(q, idx) {
    var screenId = "screen-q" + (idx + 1);
    var screen = document.getElementById(screenId);
    if (!screen) return;
    screen.style.cssText = "padding:32px 24px;max-width:520px;margin:0 auto";

    var progress = "";
    for (var i = 0; i < 3; i++) {
      progress += '<div style="height:6px;flex:1;background:' + (i <= idx ? "#FF6B6B" : "#E8E8E4") + ';border-radius:99px"></div>';
    }

    var answers = "";
    q.answers.forEach(function(ans) {
      answers += '<button class="btn quiz-ans" data-cat="' + ans.cat + '" data-qidx="' + idx + '"' +
        ' style="background:' + (ans.bg || "#F8F8F6") + ';border:2px solid transparent;border-radius:16px;padding:14px 18px;text-align:left;font-size:16px;font-weight:600;color:#1A1A1A;display:flex;align-items:center;gap:12px;width:100%;margin-bottom:10px">' +
        '<span style="font-size:24px">' + (ans.emoji || "") + '</span>' + ans.text + '</button>';
    });

    screen.innerHTML =
      '<div style="display:flex;gap:6px;margin-bottom:28px">' + progress + '</div>' +
      '<div style="font-size:48px;margin-bottom:12px">' + (q.emoji || "❓") + '</div>' +
      '<h2 style="font-size:24px;font-weight:800;color:#1A1A1A;margin-bottom:6px">' + q.question + '</h2>' +
      '<p style="color:#888;font-size:14px;margin-bottom:24px">' + (q.hint || "Pick your favourite!") + '</p>' +
      '<div id="answers-' + idx + '">' + answers + '</div>' +
      (idx === 0 ? '<button class="back-btn" id="quiz-back-' + idx + '" style="margin-top:16px">Back to Home</button>' : "");

    screen.querySelectorAll(".quiz-ans").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var cat = this.getAttribute("data-cat");
        var qidx = parseInt(this.getAttribute("data-qidx"), 10);
        quizAnswers[qidx] = cat;
        if (qidx < APP_DATA.quiz.length - 1) {
          show("q" + (qidx + 2));
        } else {
          showResult();
        }
      });
    });

    var backBtn = screen.querySelector("#quiz-back-" + idx);
    if (backBtn) backBtn.addEventListener("click", function() { show("home"); });
  });
}

// ── Show quiz result ──────────────────────────────────────────────────────────
function showResult() {
  var scores = {};
  quizAnswers.forEach(function(cat) {
    if (cat) scores[cat] = (scores[cat] || 0) + 1;
  });
  var winner = Object.keys(scores).reduce(function(a, b) { return scores[a] >= scores[b] ? a : b; }, Object.keys(scores)[0]);
  var cat = APP_DATA.categories.find(function(c) { return c.id === winner; });
  if (!cat) cat = APP_DATA.categories[0];

  var topJobs = APP_DATA.careers.filter(function(j) { return j.cat === winner; }).slice(0, 3);

  document.getElementById("result-hero").style.background = cat.bg;
  document.getElementById("result-emoji").textContent = cat.emoji;
  document.getElementById("result-title").textContent = APP_DATA.result_screen.title_prefix + " " + cat.name + "!";
  document.getElementById("result-title").style.color = cat.color;
  document.getElementById("result-desc").textContent = cat.desc;
  document.getElementById("result-desc").style.color = cat.color;
  document.getElementById("result-jobs-title").textContent = APP_DATA.result_screen.jobs_title || "Jobs you might love:";

  var rjobs = document.getElementById("result-jobs");
  rjobs.innerHTML = "";
  topJobs.forEach(function(job) {
    var btn = document.createElement("button");
    btn.className = "btn";
    btn.style.cssText = "background:#fff;border:1px solid #E8E8E4;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;width:100%;text-align:left;cursor:pointer;transition:border-color 0.1s";
    btn.innerHTML = '<span style="font-size:28px;flex-shrink:0">' + job.emoji + '</span>' +
      '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:#1A1A1A">' + job.name + '</div>' +
      '<div style="font-size:12px;color:#888;margin-top:2px">' + job.short + '</div></div>' +
      '<span style="font-size:12px;color:#A0A0A0;flex-shrink:0">→</span>';
    btn.setAttribute("data-jobid", job.id);
    btn.addEventListener("mouseenter", function() { this.style.borderColor = "#1A1A1A"; });
    btn.addEventListener("mouseleave", function() { this.style.borderColor = "#E8E8E4"; });
    btn.addEventListener("click", function() {
      document.getElementById("detail-back").onclick = function() { show("result"); };
      showDetail(this.getAttribute("data-jobid"));
    });
    rjobs.appendChild(btn);
  });

  document.getElementById("btn-retry").textContent = APP_DATA.result_screen.retry_button || "Try Again";
  document.getElementById("btn-retry").addEventListener("click", function() { quizAnswers = []; show("q1"); });
  document.getElementById("btn-explore-result").textContent = APP_DATA.result_screen.explore_button || "Explore All";
  document.getElementById("btn-explore-result").addEventListener("click", function() { show("categories"); });

  show("result");
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildHome();
buildCategories();
buildQuiz();
show("home");
</script>
</body>
</html>
